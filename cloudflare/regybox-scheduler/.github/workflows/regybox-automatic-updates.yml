---
name: Regybox Automatic Updates

on: # yamllint disable-line rule:truthy
  schedule:
    - cron: 17 5 * * *
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regybox-automatic-updates
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this Worker
        uses: actions/checkout@v7
        with:
          path: deployment
          ref: ${{ github.event.repository.default_branch }}

      - name: Check out the latest Regybox Worker
        uses: actions/checkout@v7
        with:
          repository: martimlobao/regybox
          ref: main
          path: upstream
          sparse-checkout: cloudflare/regybox-scheduler
          sparse-checkout-cone-mode: false

      - name: Apply the update without replacing personal settings
        run: >-
          node deployment/scripts/update-from-upstream.mjs
          upstream/cloudflare/regybox-scheduler deployment

      # GitHub disables scheduled workflows in inactive public repositories.
      # A monthly local commit keeps this set-and-forget updater active even
      # when there is no Regybox release to install.
      - name: Keep automatic updates active
        working-directory: deployment
        run: |
          if [ -z "$(git status --porcelain)" ] && [ "$(date -u +%d)" = "01" ]; then
            printf '{"lastCheckedAt":"%s"}\n' "$(date -u +%FT%TZ)" > .regybox-updater-state.json
          fi

      - name: Commit and deploy the update
        working-directory: deployment
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "regybox-updater[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: update Regybox scheduler"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
