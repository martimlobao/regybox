---
name: Regybox Auto Enroll
description: Enroll in a Regybox class and optionally send yourself an email confirmation.
author: Regybox Maintainers
inputs:
  class-time:
    description: Class start time (HH:MM).
    required: true
  class-type:
    description: Name of the class to book.
    required: true
  class-date-offset-days:
    description: How many days from today the class should be booked.
    required: false
    default: "2"
  phpsessid:
    description: Value of the PHPSESSID cookie from regybox.pt.
    required: true
  regybox-user:
    description: Value of the regybox_user cookie from regybox.pt.
    required: true
  calendar-url:
    description: Optional URL to an iCal calendar that blocks the slot when you already have a class planned.
    required: false
  calendar-event-name:
    description: Optional calendar event title to match. Defaults to CrossFit when omitted.
    required: false
  timeout-seconds:
    description: Maximum number of seconds to wait for enrollment to open.
    required: false
    default: "900"
  send-email:
    description: Set to true to send a confirmation email when the job finishes.
    required: false
    default: true
  email-to:
    description: Recipient email address for the confirmation email. Required when send-email is true.
    required: false
  email-from-name:
    description: Display name to use for the confirmation email. The sender address comes from email-username.
    required: false
    default: Regybox Auto-enroll
  email-username:
    description: SMTP username used to send the confirmation email.
    required: false
  email-password:
    description: SMTP password or app password used to send the confirmation email.
    required: false
  email-server:
    description: SMTP server address.
    required: false
    default: smtp.gmail.com
  email-port:
    description: SMTP server port.
    required: false
    default: "465"
runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@3259c6206f993105e3a61b142c2d97bf4b9ef83d
      with:
        ignore-empty-workdir: true
        enable-cache: false
    - name: Prepare class information
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_CLASS_DATE_OFFSET_DAYS: ${{ inputs.class-date-offset-days }}
        INPUT_CLASS_TIME: ${{ inputs.class-time }}
        INPUT_CLASS_TYPE: ${{ inputs.class-type }}
        INPUT_CALENDAR_EVENT_NAME: ${{ inputs.calendar-event-name }}
      run: |
        set -euo pipefail
        class_date=$(date -d "+${INPUT_CLASS_DATE_OFFSET_DAYS} days" +%F)
        echo "CLASS_DATE=${class_date}" >> "$GITHUB_ENV"
        echo "CLASS_TIME=${INPUT_CLASS_TIME}" >> "$GITHUB_ENV"
        echo "CLASS_TYPE=${INPUT_CLASS_TYPE}" >> "$GITHUB_ENV"
        echo "CALENDAR_EVENT_NAME=${INPUT_CALENDAR_EVENT_NAME}" >> "$GITHUB_ENV"
    - id: enroll
      name: Enroll in class
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        PHPSESSID: ${{ inputs.phpsessid }}
        REGYBOX_USER: ${{ inputs.regybox-user }}
        CALENDAR_URL: ${{ inputs.calendar-url }}
      run: |
        set -euo pipefail
        log_path="${RUNNER_TEMP}/regybox-enroll.log"
        args=(
          "${CLASS_DATE}"
          "${CLASS_TIME}"
          "${CLASS_TYPE}"
          "--timeout-seconds"
          "${{ inputs.timeout-seconds }}"
        )
        if [[ -n "${CALENDAR_EVENT_NAME// }" ]]; then
          args+=("--calendar-event-name" "${CALENDAR_EVENT_NAME}")
        fi
        echo "ENROLL_LOG_PATH=${log_path}" >> "$GITHUB_ENV"
        uv run regybox "${args[@]}" 2>&1 | tee "${log_path}"
    - name: Capture enrollment result
      if: always()
      shell: bash
      env:
        ENROLL_OUTCOME: ${{ steps.enroll.outcome }}
      run: |
        set -euo pipefail
        if [[ "${ENROLL_OUTCOME}" == "success" ]]; then
          result=success
        else
          result=failure
        fi
        echo "ENROLL_RESULT=${result}" >> "$GITHUB_ENV"
    - name: Compose confirmation email
      if: always() && inputs.send-email != 'false'
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        ENROLL_RESULT: ${{ env.ENROLL_RESULT }}
        CLASS_TYPE: ${{ env.CLASS_TYPE }}
        CLASS_DATE: ${{ env.CLASS_DATE }}
        CLASS_TIME: ${{ env.CLASS_TIME }}
        ENROLL_LOG_PATH: ${{ env.ENROLL_LOG_PATH }}
        ACTION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: uv run python -m regybox.notifications
    - name: Validate email inputs
      if: always() && inputs.send-email != 'false'
      shell: bash
      run: |
        set -euo pipefail
        missing=()
        [[ -z "${{ inputs.email-to }}" ]] && missing+=("email-to")
        [[ -z "${{ inputs.email-username }}" ]] && missing+=("email-username")
        [[ -z "${{ inputs.email-password }}" ]] && missing+=("email-password")
        if [[ ${#missing[@]} -gt 0 ]]; then
          printf 'Missing required email inputs when send-email is true: %s\n' "${missing[*]}" >&2
          exit 1
        fi
    - name: Send confirmation email
      if: always() && inputs.send-email != 'false'
      uses: dawidd6/action-send-mail@42942bc2f8fba4e611b459a018967a6a7c78c68c
      with:
        server_address: ${{ inputs.email-server }}
        server_port: ${{ inputs.email-port }}
        username: ${{ inputs.email-username }}
        password: ${{ inputs.email-password }}
        subject: ${{ env.EMAIL_SUBJECT }}
        body: ${{ env.EMAIL_BODY }}
        to: ${{ inputs.email-to }}
        from: ${{ inputs.email-from-name }} <${{ inputs.email-username }}>
branding:
  color: blue
  icon: clock
