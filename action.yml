---
name: Regybox Auto Enroll
description: Enroll in a Regybox class and optionally send yourself an email confirmation.
author: Regybox Maintainers
inputs:
  class-time:
    description: Class start time (HH:MM).
    required: true
  class-type:
    description: Name of the class to book. Use commas for ordered fallback names, for example WOD,Weekend WOD.
    required: true
  class-date:
    description: Exact class date to book in YYYY-MM-DD format. Overrides class-date-offset-days when set.
    required: false
  class-date-offset-days:
    description: How many days from today the class should be booked.
    required: false
    default: "2"
  operation:
    description: Operation to perform, either enroll or unenroll.
    required: false
    default: enroll
  not-open-is-noop:
    description: Set to true to treat enrollment-not-open as a no-op instead of a failure.
    required: false
    default: "true"
  cache-key:
    description: Optional Cloudflare KV cache key to update after a successful state change.
    required: false
  calendar-fingerprint:
    description: Optional stable calendar event fingerprint to store in Cloudflare KV.
    required: false
  cf-account-id:
    description: Cloudflare account ID used when cache-key is set.
    required: false
  cf-kv-namespace-id:
    description: Cloudflare KV namespace ID used when cache-key is set.
    required: false
  cf-kv-api-token:
    description: Cloudflare API token with KV edit permission used when cache-key is set.
    required: false
  phpsessid:
    description: Value of the PHPSESSID cookie from regybox.pt.
    required: true
  regybox-user:
    description: Value of the regybox_user cookie from regybox.pt.
    required: true
  calendar-url:
    description: Optional URL to an iCal calendar that blocks the slot when you already have a class planned.
    required: false
  calendar-event-name:
    description: Optional calendar event title to match. Defaults to CrossFit when omitted.
    required: false
  timeout-seconds:
    description: Maximum number of seconds to wait for enrollment to open.
    required: false
    default: "900"
  send-email:
    description: Set to true to send a confirmation email when the job finishes.
    required: false
    default: true
  email-to:
    description: Recipient email address for the confirmation email. Required when send-email is true.
    required: false
  email-from-name:
    description: Display name to use for the confirmation email. The sender address comes from email-username.
    required: false
    default: Regybox Auto-enroll
  email-username:
    description: SMTP username used to send the confirmation email.
    required: false
  email-password:
    description: SMTP password or app password used to send the confirmation email.
    required: false
  email-server:
    description: SMTP server address.
    required: false
    default: smtp.gmail.com
  email-port:
    description: SMTP server port.
    required: false
    default: "465"
runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@3259c6206f993105e3a61b142c2d97bf4b9ef83d
      with:
        ignore-empty-workdir: true
        enable-cache: false
    - name: Prepare class information
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_CLASS_DATE_OFFSET_DAYS: ${{ inputs.class-date-offset-days }}
        INPUT_CLASS_DATE: ${{ inputs.class-date }}
        INPUT_CLASS_TIME: ${{ inputs.class-time }}
        INPUT_CLASS_TYPE: ${{ inputs.class-type }}
        INPUT_CALENDAR_EVENT_NAME: ${{ inputs.calendar-event-name }}
        INPUT_OPERATION: ${{ inputs.operation }}
        INPUT_CACHE_KEY: ${{ inputs.cache-key }}
        INPUT_CALENDAR_FINGERPRINT: ${{ inputs.calendar-fingerprint }}
      run: |
        set -euo pipefail
        if [[ -n "${INPUT_CLASS_DATE// }" ]]; then
          class_date="${INPUT_CLASS_DATE}"
        else
          class_date=$(date -d "+${INPUT_CLASS_DATE_OFFSET_DAYS} days" +%F)
        fi
        echo "CLASS_DATE=${class_date}" >> "$GITHUB_ENV"
        echo "CLASS_TIME=${INPUT_CLASS_TIME}" >> "$GITHUB_ENV"
        echo "CLASS_TYPE=${INPUT_CLASS_TYPE}" >> "$GITHUB_ENV"
        echo "CALENDAR_EVENT_NAME=${INPUT_CALENDAR_EVENT_NAME}" >> "$GITHUB_ENV"
        echo "REGYBOX_OPERATION=${INPUT_OPERATION}" >> "$GITHUB_ENV"
        echo "CACHE_KEY=${INPUT_CACHE_KEY}" >> "$GITHUB_ENV"
        echo "CALENDAR_FINGERPRINT=${INPUT_CALENDAR_FINGERPRINT}" >> "$GITHUB_ENV"
    - id: enroll
      name: Enroll in class
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        PHPSESSID: ${{ inputs.phpsessid }}
        REGYBOX_USER: ${{ inputs.regybox-user }}
        CALENDAR_URL: ${{ inputs.calendar-url }}
      run: |
        set -euo pipefail
        log_path="${RUNNER_TEMP}/regybox-enroll.log"
        args=(
          "${CLASS_DATE}"
          "${CLASS_TIME}"
          "${CLASS_TYPE}"
          "--operation"
          "${REGYBOX_OPERATION}"
          "--timeout-seconds"
          "${{ inputs.timeout-seconds }}"
        )
        if [[ -n "${CALENDAR_EVENT_NAME// }" ]]; then
          args+=("--calendar-event-name" "${CALENDAR_EVENT_NAME}")
        fi
        if [[ "${{ inputs.not-open-is-noop }}" == "true" ]]; then
          args+=("--not-open-is-noop")
        fi
        echo "ENROLL_LOG_PATH=${log_path}" >> "$GITHUB_ENV"
        uv run regybox "${args[@]}" 2>&1 | tee "${log_path}"
    - name: Capture enrollment result
      if: always()
      shell: bash
      env:
        ENROLL_OUTCOME: ${{ steps.enroll.outcome }}
      run: |
        set -euo pipefail
        cache_should_update=false
        if [[ "${ENROLL_OUTCOME}" == "success" ]]; then
          if grep -q "REGYBOX_RESULT=noop" "${ENROLL_LOG_PATH}"; then
            result=noop
            if grep -q "REGYBOX_CACHE_STATE=not_open" "${ENROLL_LOG_PATH}"; then
              cache_should_update=true
              cache_line="$(grep "REGYBOX_CACHE_STATE=not_open" "${ENROLL_LOG_PATH}" | tail -n 1)"
              echo "CACHE_STATE=not_open" >> "$GITHUB_ENV"
              enrollment_opens_at="$(sed -n 's/.*enrollment_opens_at=\([^ ]*\).*/\1/p' <<< "${cache_line}")"
              last_checked_at="$(sed -n 's/.*last_checked_at=\([^ ]*\).*/\1/p' <<< "${cache_line}")"
              echo "ENROLLMENT_OPENS_AT=${enrollment_opens_at}" >> "$GITHUB_ENV"
              echo "LAST_CHECKED_AT=${last_checked_at}" >> "$GITHUB_ENV"
            elif ! grep -Eq "Enrollment (is not open|did not open)" "${ENROLL_LOG_PATH}"; then
              cache_should_update=true
            fi
          else
            result=success
            cache_should_update=true
          fi
        else
          result=failure
        fi
        echo "ENROLL_RESULT=${result}" >> "$GITHUB_ENV"
        echo "CACHE_SHOULD_UPDATE=${cache_should_update}" >> "$GITHUB_ENV"
    - id: update-cache
      name: Update Cloudflare KV cache
      if: >-
        env.CACHE_SHOULD_UPDATE == 'true' &&
        (env.ENROLL_RESULT == 'success' || env.ENROLL_RESULT == 'noop') &&
        env.CACHE_KEY != ''
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        CF_ACCOUNT_ID: ${{ inputs.cf-account-id }}
        CF_KV_NAMESPACE_ID: ${{ inputs.cf-kv-namespace-id }}
        CF_KV_API_TOKEN: ${{ inputs.cf-kv-api-token }}
        CACHE_KEY: ${{ env.CACHE_KEY }}
        CACHE_STATE: ${{ env.CACHE_STATE }}
        REGYBOX_OPERATION: ${{ env.REGYBOX_OPERATION }}
        CLASS_DATE: ${{ env.CLASS_DATE }}
        CLASS_TIME: ${{ env.CLASS_TIME }}
        CLASS_TYPE: ${{ env.CLASS_TYPE }}
        CALENDAR_EVENT_NAME: ${{ env.CALENDAR_EVENT_NAME }}
        CALENDAR_FINGERPRINT: ${{ env.CALENDAR_FINGERPRINT }}
        ENROLLMENT_OPENS_AT: ${{ env.ENROLLMENT_OPENS_AT }}
        LAST_CHECKED_AT: ${{ env.LAST_CHECKED_AT }}
      run: uv run python -m regybox.cloudflare_kv
    - name: Compose confirmation email
      if: always() && inputs.send-email != 'false'
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        ENROLL_RESULT: ${{ env.ENROLL_RESULT }}
        CLASS_TYPE: ${{ env.CLASS_TYPE }}
        CLASS_DATE: ${{ env.CLASS_DATE }}
        CLASS_TIME: ${{ env.CLASS_TIME }}
        REGYBOX_OPERATION: ${{ env.REGYBOX_OPERATION }}
        ENROLL_LOG_PATH: ${{ env.ENROLL_LOG_PATH }}
        ACTION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        CACHE_KEY: ${{ env.CACHE_KEY }}
        CF_ACCOUNT_ID: ${{ inputs.cf-account-id }}
        CF_KV_NAMESPACE_ID: ${{ inputs.cf-kv-namespace-id }}
        CF_KV_API_TOKEN: ${{ inputs.cf-kv-api-token }}
      run: uv run python -m regybox.notifications
    - name: Validate email inputs
      if: always() && inputs.send-email != 'false' && env.SHOULD_SEND_EMAIL == 'true'
      shell: bash
      run: |
        set -euo pipefail
        missing=()
        [[ -z "${{ inputs.email-to }}" ]] && missing+=("email-to")
        [[ -z "${{ inputs.email-username }}" ]] && missing+=("email-username")
        [[ -z "${{ inputs.email-password }}" ]] && missing+=("email-password")
        if [[ ${#missing[@]} -gt 0 ]]; then
          printf 'Missing required email inputs when send-email is true: %s\n' "${missing[*]}" >&2
          exit 1
        fi
    - name: Send confirmation email
      if: always() && inputs.send-email != 'false' && env.SHOULD_SEND_EMAIL == 'true'
      uses: dawidd6/action-send-mail@42942bc2f8fba4e611b459a018967a6a7c78c68c
      with:
        server_address: ${{ inputs.email-server }}
        server_port: ${{ inputs.email-port }}
        username: ${{ inputs.email-username }}
        password: ${{ inputs.email-password }}
        subject: ${{ env.EMAIL_SUBJECT }}
        body: ${{ env.EMAIL_BODY }}
        to: ${{ inputs.email-to }}
        from: ${{ inputs.email-from-name }} <${{ inputs.email-username }}>
branding:
  color: blue
  icon: clock
